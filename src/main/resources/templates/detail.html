<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <title th:text="${title}"></title>
  <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>
  <header class="topbar"><h1 th:text="${title}"></h1><nav><a href="/">仪表盘</a><a href="/records">列表</a><a href="/create">新建</a></nav></header>
  <main class="shell">
    <section class="panel">
      <div th:if="${item != null}">
        <h2 th:text="${item.title}"></h2>
        <p th:text="${item.owner + ' / ' + item.priority + ' / ' + item.status}"></p>
        <p th:text="${item.note}"></p>
      </div>
      <p th:if="${item == null}">未找到记录。</p>
    </section>
  </main>
</body>
</html>

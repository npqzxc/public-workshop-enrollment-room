<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <title th:text="${title}"></title>
  <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body>
  <header class="topbar"><h1 th:text="${title}"></h1><nav><a href="/">仪表盘</a><a href="/records">列表</a><a href="/create">新建</a></nav></header>
  <main class="shell">
    <section class="panel">
      <h2>记录列表</h2>
      <ul class="record-list">
        <li th:each="item : ${records}"><a th:href="@{|/records/${item.id}|}" th:text="${item.title}"></a><span th:text="${item.owner + ' / ' + item.status}"></span></li>
      </ul>
    </section>
  </main>
</body>
</html>
